services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fokuslah
      POSTGRES_PASSWORD: fokuslah_secret
      POSTGRES_DB: fokuslah
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fokuslah"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
